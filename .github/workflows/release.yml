name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create-release:
    name: Create Release & License
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-about
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-about

      - name: Generate License Attribution
        run: cargo about generate about.hbs > THIRD_PARTY_LICENSES.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: THIRD_PARTY_LICENSES.md

  build-release:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: awspm-linux-amd64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: awspm-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: awspm-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: awspm-windows-amd64.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --locked --target ${{ matrix.target }} --bin awspm

      - name: Prepare Binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mv target/${{ matrix.target }}/release/awspm ${{ matrix.artifact_name }}
          chmod +x ${{ matrix.artifact_name }}

      - name: Prepare Binary (Windows)
        if: runner.os == 'Windows'
        run: |
          mv target/${{ matrix.target }}/release/awspm.exe ${{ matrix.artifact_name }}

      - name: Smoke Test
        shell: bash
        run: |
          ./${{ matrix.artifact_name }} --version || echo "Binary might be broken, but continuing packaging..."

      - name: Generate Checksum
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            sha256sum ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256
          else
            shasum -a 256 ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ matrix.artifact_name }}
            ${{ matrix.artifact_name }}.sha256

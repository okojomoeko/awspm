name: Bug Report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How can we reproduce the issue?
      description: |
        Please provide a Minimal Reproducible Example if possible.
        1. Run command '...'
        2. Select profile '...'
        3. See error '...'
      placeholder: Instructions to reproduce the bug
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of awspm are you running? (Run `awspm --version`)
      placeholder: x.y.z
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
      default: 0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell
